name: Deploy Mintlify

# Il deploy su push è gestito dalla Mintlify GitHub App (piano gratuito).
# L'Admin API POST /project/update richiede un piano Mintlify superiore.
# Questo workflow resta disponibile per trigger manuale se in futuro si fa upgrade.
on:
  workflow_dispatch:

concurrency:
  group: deploy-mintlify
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Mintlify deploy (Admin API)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Trigger and wait for Mintlify
        env:
          MINTLIFY_ADMIN_KEY: ${{ secrets.MINTLIFY_ADMIN_KEY || vars.MINTLIFY_ADMIN_KEY }}
          MINTLIFY_PROJECT_ID: ${{ secrets.MINTLIFY_PROJECT_ID || vars.MINTLIFY_PROJECT_ID }}
        run: node scripts/trigger-mintlify-deploy.mjs
